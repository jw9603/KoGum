# KoGum 0.5B Model Configuration with KORMo Tokenizer
# Target: ~492M parameters
# Context: 16K tokens with gradient checkpointing

model_type: kogum

# Vocabulary - KORMo tokenizer
vocab_size: 125041  # KORMo vocab_size + special tokens

# Model dimensions - 0.5B parameter budget
hidden_size: 1024        # 16 heads × 64 head_dim
intermediate_size: 5120  # 5x ratio for SwiGLU
num_hidden_layers: 24    # Depth for capacity
num_attention_heads: 16  # 16 query heads
num_key_value_heads: 8   # GQA 2:1 ratio (16/8 = 2)
head_dim: 64             # Standard head dimension

# Activation
hidden_act: silu  # Note: MLP uses SwiGLU (gate_proj + up_proj + down_proj)

# Position embeddings - 16K context
max_position_embeddings: 16384  # 16K context length
rope_theta: 500000.0            # For long context support

# Normalization
rms_norm_eps: 1.0e-5

# Initialization
initializer_range: 0.02

# Attention
attention_bias: false
attention_dropout: 0.0

# MLP
mlp_bias: false

# Embedding
tie_word_embeddings: false

# Cache
use_cache: true

# Special tokens - KORMo tokenizer
# <|PAD|> → 125032
# <|BOS|> → 125030
# <|EOT|> (EOS) → 125040
# Note: KORMo has no UNK token
pad_token_id: 125032
bos_token_id: 125030
eos_token_id: 125040
